apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-deployment
  namespace: ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment
  template:
    metadata:
      labels:
        app: payment
    spec:
      containers:
      - name: payment
        image: shivanshks06/ecommerse-k8s-payment-service:latest
        ports:
        - containerPort: 4003

        livenessProbe:
          httpGet:
            path: /health
            port: 4003
          initialDelaySeconds: 5
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /health
            port: 4003
          initialDelaySeconds: 5
          periodSeconds: 10